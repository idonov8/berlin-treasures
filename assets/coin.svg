<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Berlin Treasures gold coin. Edit colours here or via design-system.md tokens. -->
  <defs>
    <radialGradient id="coinFace" cx="38%" cy="33%" r="78%">
      <stop offset="0%" stop-color="#fff4b8"/>
      <stop offset="46%" stop-color="#ffd23f"/>
      <stop offset="100%" stop-color="#e39a12"/>
    </radialGradient>
  </defs>
  <!-- kept simple: at the tiny on-screen size, fine detail (rings/stars) just reads as noise.
       Physics layer stretches this circle non-uniformly per-coin for oval variety. -->
  <circle cx="50" cy="50" r="45" fill="url(#coinFace)" stroke="#5a3d0a" stroke-width="7"/>
  <ellipse cx="36" cy="34" rx="13" ry="8" fill="#fff8d6" opacity="0.85"/>
</svg>
